# Stellar Codex — CI (GitHub Actions)
# Vollständige Prüfung in der Cloud: npm ci → typecheck → lint (falls ESLint) → Vitest (falls Config) → build.
# Auf schwacher lokaler Hardware: docs/DEVELOPMENT.md — schwere Läufe primär hier.

name: CI

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Kern: install → Typecheck → Production-Build (standardisierte Ubuntu-Runner)
  verify:
    name: Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        if: hashFiles('eslint.config.js') != '' || hashFiles('eslint.config.mjs') != ''
        run: npm run lint

      - name: Unit tests
        if: hashFiles('vitest.config.ts') != '' || hashFiles('vitest.config.mts') != ''
        run: npx vitest run --coverage=false

      - name: Production build
        run: npm run build

  # E2E (Playwright): nur wenn playwright.config existiert — schwere Suite läuft in CI, nicht lokal Low-End
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: verify
    if: hashFiles('playwright.config.ts') != '' || hashFiles('playwright.config.mts') != ''
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run E2E
        run: npx playwright test
